      font-size: 13px;
      text-anchor: middle;
      fill: #cc1111;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { fill: #8b0000; opacity: 0.8; }
      50%      { fill: #ff3333; opacity: 1;   }
    }
  </style>

  <rect width="900" height="270" fill="#0d1117"/>
  <rect width="900" height="270" fill="url(#bgGlow)"/>

  <!-- BRENO — 43 chars per row, textLength forçado para alinhar -->
