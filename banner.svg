<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="270" viewBox="0 0 900 270">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3d0000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .ascii {
